  <script>
    (function() {
      document.getElementById('footer-year').textContent = new Date().getFullYear();
      var params = new URLSearchParams(location.search);
      var id = params.get('id');
      var root = document.getElementById('title-root');
      if (!id) {
        root.innerHTML = '<p class="text-muted">Укажите id в адресе: title.html?id=title-slug</p>';
        return;
      }
      App.loadLibrary().then(function(data) {
        if (data && data.site) {
          var t = document.getElementById('telegram-link');
          if (t) t.href = data.site.telegram || '#';
          var ft = document.getElementById('footer-telegram');
          if (ft) ft.href = data.site.telegram || '#';
        }
        var title = (data && data.titles) ? data.titles.find(function(t) { return t.id === id; }) : null;
        if (!title) {
          root.innerHTML = '<p class="text-muted">Тайтл не найден.</p>';
          document.title = 'Blizzard Brotherhood — Не найдено';
          return;
        }
        document.title = (title.titleEn || title.title) + ' — Blizzard Brotherhood';
        if (title.description) {
          var desc = document.querySelector('meta[name="description"]');
          if (desc) desc.content = title.description.substring(0, 160);
        }
        App.renderTitlePage(root, title);
      }).catch(function() {
        root.innerHTML = '<p class="text-muted">Не удалось загрузить данные.</p>';
      });
    })();
  </script>
