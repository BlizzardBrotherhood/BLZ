<body>
  <div class="page-wrap">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo-link">
          <img src="assets/images/logo.png" alt="" class="logo-img" width="28" height="28">
          <span>Blizzard Brotherhood</span>
        </a>
        <div class="header-actions">
          <a href="#" id="telegram-link" target="_blank" rel="noopener" aria-label="Telegram">📢</a>
        </div>
      </div>
      <hr class="decor-line">
    </header>

    <main class="main">
      <section class="hero">
        <p class="hero-tagline">Translations crafted with soul</p>
        <p class="hero-last" id="hero-last">Загрузка…</p>
      </section>

      <div class="container">
        <div class="titles-grid" id="titles-grid">
          <!-- Filled by app.js -->
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>© <span id="footer-year">2024</span> Blizzard Brotherhood</p>
      <p class="footer-links">
        <a href="#" id="footer-telegram">Telegram</a> · <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      </p>
      <p class="footer-note">All translations are fan-made and non-commercial</p>
    </footer>
  </div>
  <script defer src="assets/js/app.js"></script>
  <script>
    (function() {
      document.getElementById('footer-year').textContent = new Date().getFullYear();
      
      // Ждем, пока App станет доступен
      function waitForApp(callback) {
        if (window.App && window.App.loadLibrary) {
          callback();
        } else {
          console.log('Waiting for App to load...');
          setTimeout(function() { waitForApp(callback); }, 100);
        }
      }
      
      waitForApp(function() {
        App.loadLibrary().then(function(data) {
          if (data && data.site) {
            var t = document.getElementById('telegram-link');
            if (t) { t.href = data.site.telegram || '#'; }
            var ft = document.getElementById('footer-telegram');
            if (ft) { ft.href = data.site.telegram || '#'; }
            var last = document.getElementById('hero-last');
            if (last && data.titles && data.titles.length) {
              var lastTitle = data.titles[0];
              var lastCh = lastTitle.chapters && lastTitle.chapters.length
                ? lastTitle.chapters.slice().sort(function(a,b) { return (b.datePublished || '').localeCompare(a.datePublished || ''); })[0]
                : null;
              if (lastCh) {
                last.textContent = 'Последнее обновление: ' + (lastTitle.title || lastTitle.titleEn) + ' — гл. ' + (lastCh.number || lastCh.id);
              } else {
                last.textContent = 'Последнее обновление: ' + (data.site.lastUpdated || '');
              }
            } else {
              last.textContent = data.site.lastUpdated ? 'Обновлено: ' + data.site.lastUpdated : '';
            }
          }
          App.renderHome(document.getElementById('titles-grid'), data);
        }).catch(function(error) {
          console.error('Error loading data:', error);
          document.getElementById('hero-last').textContent = 'Не удалось загрузить данные';
          document.getElementById('titles-grid').innerHTML = '<p class="text-muted">Ошибка загрузки данных. Проверьте консоль.</p>';
        });
      });
    })();
  </script>
